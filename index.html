<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FY Timetable – School of Humanities & Engineering Sciences</title>
<style>
  :root {
    --bg: #f8f9fc; --card: #ffffff; --border: #e2e6f0;
    --primary: #1e3a5f; --accent: #2e6be6; --accent-light: #eef3fd;
    --theory: #2e6be6; --lab: #16a34a; --tutorial: #d97706;
    --text: #1a1e2d; --muted: #6b7280; --row-hover: #f0f5ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  .header { background: var(--primary); color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .badge-count { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 4px 14px; font-size: 13px; white-space: nowrap; }
  .controls { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .controls label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .controls select, .controls input[type=text] { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; color: var(--text); background: var(--bg); outline: none; cursor: pointer; }
  .controls select:focus, .controls input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(46,107,230,0.12); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .btn-reset { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .btn-reset:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .type-legend { padding: 10px 32px; display: flex; gap: 16px; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-theory { background: var(--theory); } .dot-lab { background: var(--lab); } .dot-tutorial { background: var(--tutorial); }
  .stats-bar { padding: 8px 32px; font-size: 12px; color: var(--muted); background: var(--bg); border-bottom: 1px solid var(--border); }
  .stats-bar strong { color: var(--text); }
  .table-wrapper { padding: 20px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  thead tr { background: var(--primary); }
  th { padding: 11px 14px; text-align: left; font-size: 11.5px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; cursor: pointer; user-select: none; transition: background 0.1s; }
  th:hover { background: #2a4f80; }
  th .sort-icon { opacity: 0.5; font-size: 10px; margin-left: 4px; }
  th.sorted .sort-icon { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  td { padding: 10px 14px; font-size: 13px; vertical-align: middle; }
  .day-badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
  .day-Monday { background: #ede9fe; color: #5b21b6; }
  .day-Tuesday { background: #fce7f3; color: #9d174d; }
  .day-Wednesday { background: #d1fae5; color: #065f46; }
  .day-Thursday { background: #fef3c7; color: #92400e; }
  .day-Friday { background: #dbeafe; color: #1e40af; }
  .day-Saturday { background: #fde8d8; color: #9a3412; }
  .type-badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
  .type-Theory { background: #eff6ff; color: var(--theory); }
  .type-Lab { background: #f0fdf4; color: var(--lab); }
  .type-Tutorial { background: #fffbeb; color: var(--tutorial); }
  .time-cell { font-family: 'Courier New', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .course-cell { font-weight: 700; color: var(--primary); }
  .room-cell { font-weight: 600; background: #f1f5f9; border-radius: 4px; padding: 2px 6px; font-size: 12px; color: #475569; display: inline-block; }
  .div-cell { font-weight: 600; color: #374151; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  @media (max-width: 700px) {
    .controls, .table-wrapper, .header, .type-legend, .stats-bar { padding-left: 16px; padding-right: 16px; }
    th, td { padding: 8px 10px; font-size: 12px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.1/dist/xlsx.full.min.js"></script>
</head>

<div class="header">

</div>
<div class="type-legend">

<div class="stats-bar">Showing <strong id="shown-count">835</strong> of <strong>835</strong> sessions</div>
<div class="table-wrapper">

        <th onclick="sortBy('Course')" data-col="Course">Course <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Type')" data-col="Type">Type <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Div/Batch')" data-col="Div/Batch">Div / Batch <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Faculty')" data-col="Faculty">Faculty <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Room')" data-col="Room">Room <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="icon">🔍</div><p>No sessions match your filters.</p>
  </div>
</div>

const DAY_ORDER = {Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Saturday:5};
let sortCol='Day', sortDir=1;
let activeData = Array.isArray(RAW) ? RAW.slice() : [];
const fCourse = document.getElementById('f-course');
const fDiv = document.getElementById('f-div');

function populateFilters(){
  const courses = [...new Set(activeData.map(r=>r.Course).filter(Boolean))].sort();
  const divs = [...new Set(activeData.map(r=>r['Div/Batch']).filter(Boolean))].sort();
  const currentCourse = fCourse.value;
  const currentDiv = fDiv.value;
  fCourse.innerHTML = '<option value="">All Courses</option>' + courses.map(c=>`<option value="${c}">${c}</option>`).join('');
  fDiv.innerHTML = '<option value="">All Divisions</option>' + divs.map(d=>`<option value="${d}">${d}</option>`).join('');
  fCourse.value = courses.includes(currentCourse) ? currentCourse : '';
  fDiv.value = divs.includes(currentDiv) ? currentDiv : '';
}
function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  const th=document.querySelector(`th[data-col="${col}"]`);
  if(th){th.classList.add('sorted');th.querySelector('.sort-icon').textContent=sortDir===1?'↑':'↓';}
  render();
}
function getFiltered(){
  const day=document.getElementById('f-day').value;
  const type=document.getElementById('f-type').value;
  const course=document.getElementById('f-course').value;
  const div=document.getElementById('f-div').value;
  const search=document.getElementById('f-search').value.toLowerCase().trim();
  return activeData.filter(r=>{
    if(day&&r.Day!==day)return false;
    if(type&&r.Type!==type)return false;
    if(course&&r.Course!==course)return false;
    if(div&&r['Div/Batch']!==div)return false;
    if(search&&!`${r.Faculty} ${r.Room} ${r.Course} ${r['Div/Batch']} ${r.Type}`.toLowerCase().includes(search))return false;
    return true;
  });
}
function render(){
  const data=getFiltered();
  data.sort((a,b)=>{
    let av=sortCol==='Day'?DAY_ORDER[a.Day]:(a[sortCol]||'');
    let bv=sortCol==='Day'?DAY_ORDER[b.Day]:(b[sortCol]||'');
    if(typeof av==='number')return(av-bv)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;

}
function resetFilters(){

}
['f-day','f-type','f-course','f-div','f-search'].forEach(id=>document.getElementById(id).addEventListener('input',render));

function normalizeRecord(row) {
  return {

  const sheetName = workbook.SheetNames[0];

  reader.onload = function (e) {
    try {
      const data = e.target.result;
      const workbook = extension === 'csv' ? XLSX.read(data, { type: 'binary' }) : XLSX.read(data, { type: 'array' });
      const rows = buildRowsFromWorkbook(workbook);
      if (!rows.length) throw new Error('No usable rows were found in the file.');
      activeData = rows;
      populateFilters();
      setStatus(`Loaded ${activeData.length} rows from ${file.name}`);
      render();
    } catch (err) {
      setStatus(`Could not read ${file.name}: ${err.message}`, true);
    }
  };
  if (extension === 'csv') reader.readAsBinaryString(file);
  else reader.readAsArrayBuffer(file);
});
setStatus('Upload an Excel or CSV file to use your own timetable data');
</script>
</body>
</html>
